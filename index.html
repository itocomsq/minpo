<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1814">
<title>民法ノート</title>
<style>
:root{
  --ink:#1a1814;--ink-muted:#5a5650;--ink-faint:#9a9590;
  --paper:#f7f4ef;--paper-warm:#ede9e2;--card-bg:#faf8f5;
  --rule:#d4cfc8;--accent:#8b2f2f;--accent-soft:#f5eded;
  --ok:#2a6b3a;--ng:#8b2f2f;--tag-bg:#e8e4dd;
  --serif:'Noto Serif JP',Georgia,serif;
  --sans:'Noto Sans JP','Hiragino Kaku Gothic ProN',system-ui,sans-serif;
  --r:6px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%}

/* TOPBAR */
#topbar{
  background:var(--ink);color:#fff;
  padding:10px 14px 10px;
  padding-top:calc(10px + var(--st));
  display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;
}
#logo{font-family:var(--serif);font-size:16px;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
#logo em{color:#c08080;font-style:normal}
#sw{flex:1;position:relative}
#si{
  width:100%;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);
  border-radius:18px;color:#fff;font-family:var(--sans);font-size:14px;
  padding:7px 32px 7px 13px;outline:none;appearance:none;
}
#si::placeholder{color:rgba(255,255,255,.4)}
#si:focus{background:rgba(255,255,255,.2)}
#clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.5);font-size:15px;cursor:pointer;display:none;padding:2px 4px}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;min-height:100%;padding:12px 13px calc(72px + var(--sb))}
.page.active{display:block}

/* TABBAR */
#tabbar{
  display:flex;background:var(--ink);
  border-top:1px solid rgba(255,255,255,.1);flex-shrink:0;
}
.tab{
  flex:1;padding:8px 0;padding-bottom:calc(8px + var(--sb));
  background:none;border:none;color:rgba(255,255,255,.45);
  font-family:var(--sans);font-size:11px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;transition:color .15s;
}
.tab .ic{font-size:20px;line-height:1.2}
.tab.on{color:#fff}

/* LIST */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cnt{font-size:12px;color:var(--ink-faint)}
.tag-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;margin-bottom:12px}
.tag-row::-webkit-scrollbar{display:none}
.chip{background:var(--tag-bg);border:1px solid transparent;border-radius:18px;
  white-space:nowrap;font-size:12px;padding:4px 11px;color:var(--ink-muted);cursor:pointer;flex-shrink:0;transition:all .12s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.clist{display:flex;flex-direction:column;gap:9px}
.card{background:var(--card-bg);border:1px solid var(--rule);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:opacity .12s}
.card:active{opacity:.75}
.c-term{font-family:var(--serif);font-size:15px;font-weight:600;letter-spacing:.03em;margin-bottom:3px}
.c-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.c-tag{background:var(--tag-bg);border-radius:10px;font-size:11px;padding:2px 7px;color:var(--ink-muted)}
.c-body{font-size:13px;color:var(--ink-muted);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{text-align:center;padding:60px 16px;color:var(--ink-faint)}
.empty .big{font-size:40px;margin-bottom:10px}

/* FAB */
#fab{position:fixed;bottom:calc(64px + var(--sb) + 10px);right:16px;
  width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;
  border:none;font-size:26px;cursor:pointer;z-index:40;
  box-shadow:0 4px 16px rgba(139,47,47,.45);display:flex;align-items:center;justify-content:center;
  transition:transform .15s}
#fab:active{transform:scale(.9)}

/* QUIZ PAGE */
.q-title{font-family:var(--serif);font-size:20px;margin-bottom:4px}
.q-sub{font-size:13px;color:var(--ink-muted);margin-bottom:18px}
.qfield{margin-bottom:13px}
.qfield label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px}
.qfield select{width:100%;background:var(--card-bg);border:1px solid var(--rule);border-radius:var(--r);
  color:var(--ink);font-family:var(--sans);font-size:14px;padding:9px 12px;outline:none;appearance:none}
.sbtn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  font-family:var(--sans);font-size:16px;padding:13px;cursor:pointer;font-weight:600;margin-top:4px}
.q-prog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.pbar{flex:1;height:4px;background:var(--rule);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.ptext{font-size:12px;color:var(--ink-muted);white-space:nowrap}
.qcard{background:var(--card-bg);border:1px solid var(--rule);border-radius:var(--r);
  padding:22px 18px;min-height:190px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  box-shadow:0 4px 18px rgba(26,24,20,.1);margin-bottom:12px;cursor:pointer}
.qcard:active{opacity:.85}
.qmode{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
.qq{font-family:var(--serif);font-size:19px;font-weight:600;line-height:1.5;color:var(--ink)}
.qtap{font-size:12px;color:var(--ink-faint);margin-top:12px}
.qans{display:none;width:100%;margin-top:14px;padding-top:12px;border-top:1px dashed var(--rule);text-align:left}
.qans.show{display:block}
.qa-lbl{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.qa-txt{font-size:14px;color:var(--ink);line-height:1.75;white-space:pre-wrap}
.qbtns{display:flex;gap:10px;justify-content:center}
.qbok{background:#e8f5ea;border:1px solid #88cc88;color:var(--ok);
  border-radius:var(--r);padding:12px 0;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--sans);flex:1;max-width:150px}
.qbok:active{background:#d0eed4}
.qbng{background:var(--accent-soft);border:1px solid #cc8888;color:var(--ng);
  border-radius:var(--r);padding:12px 0;font-size:15px;font-weight:700;
  cursor:pointer;font-family:var(--sans);flex:1;max-width:150px}
.qbng:active{background:#f0dada}
.qresult{text-align:center;padding:40px 16px}
.qscore{font-family:var(--serif);font-size:68px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px}
.qsl{font-size:13px;color:var(--ink-muted);margin-bottom:24px}
.bdown{display:flex;justify-content:center;gap:28px;margin-bottom:24px}
.bi{text-align:center}
.bn{font-size:30px;font-weight:700}
.bn.ok{color:var(--ok)}.bn.ng{color:var(--ng)}
.bl{font-size:12px;color:var(--ink-faint)}
.rbtns{display:flex;flex-direction:column;gap:10px;max-width:260px;margin:0 auto}

/* SHEETS */
.ov{display:none;position:fixed;inset:0;background:rgba(26,24,20,.5);z-index:100;align-items:flex-end}
.ov.open{display:flex}
.sheet{background:var(--card-bg);border-radius:14px 14px 0 0;width:100%;
  max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px calc(16px + var(--sb));animation:su .22s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:34px;height:4px;background:var(--rule);border-radius:2px;margin:11px auto 16px}
.sh-title{font-family:var(--serif);font-size:17px;margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--rule)}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px}
.field input,.field textarea{
  width:100%;background:var(--paper);border:1px solid var(--rule);border-radius:var(--r);
  color:var(--ink);font-family:var(--sans);font-size:15px;padding:10px 12px;
  outline:none;appearance:none;resize:vertical;
}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:88px}
.fhint{font-size:12px;color:var(--ink-faint);margin-top:3px}

.itabs{display:flex;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.itab{flex:1;background:none;border:none;padding:9px;font-size:13px;cursor:pointer;font-family:var(--sans);color:var(--ink-muted);transition:all .15s}
.itab.on{background:var(--accent);color:#fff}

/* AI prompt panel */
.pbox{background:var(--paper-warm);border:1px solid var(--rule);border-radius:var(--r);padding:12px;margin-bottom:12px}
.pbox-lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.pbox-txt{font-size:12px;color:var(--ink);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow-y:auto}
.cpbtn{width:100%;background:var(--ink);color:#fff;border:none;border-radius:var(--r);
  font-family:var(--sans);font-size:14px;padding:10px;cursor:pointer;margin-top:8px;font-weight:600}
.cpbtn:active{opacity:.75}
.paste-hint{font-size:12px;color:var(--ink-muted);margin:10px 0 4px;text-align:center}
.ai-prev{background:var(--paper-warm);border:1px solid var(--rule);border-radius:var(--r);padding:12px;margin-bottom:6px;display:none}
.ai-prev-lbl{font-size:11px;color:var(--ink-faint);margin-bottom:8px}

.sh-act{display:flex;gap:10px;margin-top:18px}
.bsave{flex:1;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  font-family:var(--sans);font-size:15px;padding:12px;cursor:pointer;font-weight:600}
.bcancel{background:var(--paper-warm);color:var(--ink-muted);border:1px solid var(--rule);
  border-radius:var(--r);font-family:var(--sans);font-size:15px;padding:12px 16px;cursor:pointer}

/* DETAIL */
.d-term{font-family:var(--serif);font-size:21px;font-weight:700;margin-bottom:7px}
.d-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.d-body{font-size:14px;line-height:1.8;white-space:pre-wrap;color:var(--ink)}
.d-act{display:flex;gap:8px;margin-top:16px;padding-top:13px;border-top:1px solid var(--rule)}
.bedit{flex:1;background:var(--paper-warm);color:var(--ink);border:1px solid var(--rule);border-radius:var(--r);
  font-family:var(--sans);font-size:14px;padding:11px;cursor:pointer}
.bdel{background:var(--accent-soft);color:var(--ng);border:1px solid #cc8888;border-radius:var(--r);
  font-family:var(--sans);font-size:14px;padding:11px 14px;cursor:pointer}
.bclose{background:var(--paper-warm);color:var(--ink-muted);border:1px solid var(--rule);border-radius:var(--r);
  font-family:var(--sans);font-size:14px;padding:11px 14px;cursor:pointer}

mark{background:#f9d87a;color:inherit;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">民法<em>ノート</em></div>
    <div id="sw">
      <input id="si" type="search" placeholder="検索…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="clr" onclick="clrSearch()">✕</button>
    </div>
  </div>

  <div id="content">
    <!-- LIST -->
    <div class="page active" id="listPage">
      <div class="toolbar">
        <span class="cnt" id="cnt">0件</span>
      </div>
      <div class="tag-row" id="tagRow"></div>
      <div class="clist" id="clist"></div>
    </div>

    <!-- QUIZ -->
    <div class="page" id="quizPage">
      <div id="qSetup">
        <div class="q-title">クイズ</div>
        <div class="q-sub">用語↔説明をランダムに出題します</div>
        <div class="qfield">
          <label>タグでしぼる</label>
          <select id="qts"><option value="">すべて</option></select>
        </div>
        <div class="qfield">
          <label>出題数</label>
          <select id="qc">
            <option value="10">10問</option>
            <option value="20">20問</option>
            <option value="30">30問</option>
            <option value="0">全問</option>
          </select>
        </div>
        <button class="sbtn" onclick="startQuiz()">開始する</button>
      </div>
      <div id="qPlay" style="display:none">
        <div class="q-prog">
          <div class="pbar"><div class="pfill" id="pf"></div></div>
          <span class="ptext" id="pt"></span>
        </div>
        <div class="qcard" id="qcard" onclick="reveal()">
          <div class="qmode" id="qm"></div>
          <div class="qq" id="qq"></div>
          <div class="qtap" id="qtap">タップして答えを確認</div>
          <div class="qans" id="qans">
            <div class="qa-lbl">答え</div>
            <div class="qa-txt" id="qat"></div>
          </div>
        </div>
        <div class="qbtns" id="qbtns" style="display:none">
          <button class="qbok" onclick="judge(true)">✓ 正解</button>
          <button class="qbng" onclick="judge(false)">✗ 不正解</button>
        </div>
      </div>
      <div id="qRes" style="display:none" class="qresult">
        <div class="qscore" id="rs"></div>
        <div class="qsl">正解率</div>
        <div class="bdown">
          <div class="bi"><div class="bn ok" id="rok"></div><div class="bl">正解</div></div>
          <div class="bi"><div class="bn ng" id="rng"></div><div class="bl">不正解</div></div>
          <div class="bi"><div class="bn" id="rt"></div><div class="bl">合計</div></div>
        </div>
        <div class="rbtns">
          <button class="sbtn" onclick="resetQ()">もう一度</button>
          <button class="bcancel" style="width:100%;padding:12px" onclick="sw('list')">一覧に戻る</button>
        </div>
      </div>
    </div>

    <!-- IMPORT PAGE -->
    <div class="page" id="importPage">
      <div class="q-title">インポート</div>
      <div class="q-sub" style="margin-bottom:18px">カードデータ（JSON）を一括登録します</div>

      <div style="background:var(--card-bg);border:1px solid var(--rule);border-radius:var(--r);padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:600;color:var(--ink-muted);letter-spacing:.05em;margin-bottom:8px">📋 JSONを貼り付け</div>
        <textarea id="importJson" style="width:100%;min-height:140px;background:var(--paper);border:1px solid var(--rule);border-radius:var(--r);color:var(--ink);font-family:monospace;font-size:12px;padding:10px;outline:none;resize:vertical" placeholder='[{"term":"用語","body":"内容","tags":["タグ"]}]'></textarea>
        <div id="importStatus" style="font-size:12px;color:var(--ink-faint);margin-top:6px"></div>
      </div>

      <button class="sbtn" onclick="doImport()" style="margin-bottom:10px">登録する</button>
      <button class="bcancel" style="width:100%;padding:12px;margin-bottom:20px" onclick="document.getElementById('importJson').value='';document.getElementById('importStatus').textContent=''">クリア</button>

      <div style="border-top:1px solid var(--rule);padding-top:16px">
        <div style="font-size:12px;font-weight:600;color:var(--ink-muted);letter-spacing:.05em;margin-bottom:8px">📤 現在のカードをエクスポート</div>
        <button class="sbtn" style="background:var(--ink)" onclick="doExport()">JSONをコピーする</button>
        <div id="exportStatus" style="font-size:12px;color:var(--ok);margin-top:6px"></div>
      </div>
    </div>

  </div>

  <div id="tabbar">
    <button class="tab on" id="tab-list" onclick="sw('list')">
      <span class="ic">📋</span>一覧
    </button>
    <button class="tab" id="tab-quiz" onclick="sw('quiz')">
      <span class="ic">🎯</span>クイズ
    </button>
    <button class="tab" id="tab-import" onclick="sw('import')">
      <span class="ic">📥</span>インポート
    </button>
  </div>
</div>

<button id="fab" onclick="openAdd()">＋</button>

<!-- EDIT SHEET -->
<div class="ov" id="editOv" onclick="bgClick(event,'editOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sh-title" id="edTitle">カードを追加</div>
    <div class="itabs">
      <button class="itab on" id="itText" onclick="sitab('text')">✏ テキスト</button>
      <button class="itab" id="itAI" onclick="sitab('ai')">🤖 AIで変換</button>
    </div>

    <!-- TEXT -->
    <div id="pText">
      <div class="field">
        <label>用語・条文番号 <span style="color:var(--accent)">*</span></label>
        <input id="fTerm" type="text" placeholder="例：意思表示、民法93条">
      </div>
      <div class="field">
        <label>内容・説明</label>
        <textarea id="fBody" placeholder="定義、条文テキスト、解説メモなど"></textarea>
      </div>
      <div class="field">
        <label>タグ</label>
        <input id="fTags" type="text" placeholder="総則, 意思表示（カンマ区切り）">
        <div class="fhint">カンマ区切りで複数入力できます</div>
      </div>
    </div>

    <!-- AI -->
    <div id="pAI" style="display:none">
      <div class="field">
        <label>教科書・ノートのテキストを貼る</label>
        <textarea id="fSrc" placeholder="教科書のページをそのまま貼り付けてください。&#10;（カメラAIでOCRした結果でもOK）" style="min-height:100px"></textarea>
      </div>
      <div class="pbox" id="pbox" style="display:none">
        <div class="pbox-lbl">このプロンプトをコピーして使っているAIに投げてください</div>
        <div class="pbox-txt" id="ptxt"></div>
        <button class="cpbtn" onclick="copyP()">📋 プロンプトをコピー</button>
      </div>
      <button class="sbtn" style="margin-bottom:10px" onclick="genPrompt()">プロンプトを生成する</button>
      <div class="paste-hint">↓ AIの回答（JSON）をここに貼る</div>
      <div class="field">
        <textarea id="fAR" placeholder='{"term":"意思表示","body":"...","tags":["総則"]}' style="min-height:70px" oninput="parseAR()"></textarea>
      </div>
      <div class="ai-prev" id="aiPrev">
        <div class="ai-prev-lbl">プレビュー（編集できます）</div>
        <div class="field" style="margin-bottom:9px">
          <label>用語</label><input id="fTA" type="text">
        </div>
        <div class="field" style="margin-bottom:9px">
          <label>内容</label><textarea id="fBA" style="min-height:66px"></textarea>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>タグ</label><input id="fGA" type="text">
        </div>
      </div>
    </div>

    <div class="sh-act">
      <button class="bcancel" onclick="closeOv('editOv')">キャンセル</button>
      <button class="bsave" onclick="saveCard()">保存</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="ov" id="detOv" onclick="bgClick(event,'detOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="d-term" id="dTerm"></div>
    <div class="d-tags" id="dTags"></div>
    <div class="d-body" id="dBody"></div>
    <div class="d-act">
      <button class="bedit" onclick="editFD()">編集</button>
      <button class="bdel" onclick="delFD()">削除</button>
      <button class="bclose" onclick="closeOv('detOv')">閉じる</button>
    </div>
  </div>
</div>

<script>
const SK='minpo_v4';
let cards=[],activeTag='',searchQ='',editingId=null,inputTab='text',detailId=null;
let deck=[],qi=0,qOk=0,qNg=0,qShown=false;

const SEED=[
  /* ── 第1章：民法の本質 ── */
  {id:"s001",term:"利益衡量",body:"【用語解説】\n「衡」とは、はかりを意味する。衡量とは「量をはかりにかけること」をいう。\n法的判断において当事者間の相対立する利益を比較し、より大きな利益をもたらす結論を導き出す作業のこと。\n\n【ポイント】\n民法理解の最重要概念。真理は2つある（善人2人・悪人1人）という構造を理解することが民法習得の第一歩。",tags:["民法の本質","用語","基本概念"],createdAt:1700000001000},
  {id:"s005",term:"占有",body:"【用語解説】\n自己のためにする意思で物を所持すること。\n所持とは、物を事実上支配する状態をいう。\n\n【民法192条との関係】\n「動産の占有を始めた者」＝動産を手元に持っている者\n例：YがAから宝石の引渡しを受けている状態",tags:["物権","用語","占有","民法192条"],createdAt:1700000005000},
  {id:"s006",term:"善意・悪意",body:"【用語解説】※日常用語と全く意味が異なる！\n\n善意＝ある事情を知らないこと\n悪意＝ある事情を知っていること\n\n【民法192条との関係】\n「善意・無過失」\n→ YがAに権利がないことを知らず（善意）、かつ知らないことに過失がない（無過失）ことが即時取得の要件",tags:["民法の本質","物権","用語","善意","悪意"],createdAt:1700000006000},
  /* ── 基本原則 ── */
  {id:"b001",term:"民法1条【基本原則・条文】",body:"【条文】\n①私権は、公共の福祉に適合しなければならない。\n②権利の行使及び義務の履行は、信義に従い誠実に行わなければならない。\n③権利の濫用は、これを許さない。\n\n【各項の内容】\n1項＝私権の公共性の原則\n2項＝信義誠実の原則（信義則）\n3項＝権利濫用の禁止\n\n個別の要件・効果を直接定めない一般条項。他の条文で解決できない場合に補充的に用いる。",tags:["民法の本質","基本原則","条文","民法1条"],createdAt:1700001001000},
  {id:"b002",term:"信義則（信義誠実の原則）",body:"【根拠条文】民法1条2項\n\n【定義】\n社会生活上、相手方の信頼を裏切らないよう誠実に行動すべき原則。\n\n【派生原理】\n・禁反言（エストッペル）の法則\n・クリーンハンズの原則\n・事情変更の原則\n・権利失効の原則\n\n【90条との関係】\n90条（公序良俗）と並ぶ一般条項。最後の手段として補充的に使う。",tags:["民法の本質","用語","信義則","民法1条"],createdAt:1700001002000},
  {id:"b003",term:"権利濫用",body:"【根拠条文】民法1条3項\n\n【定義】\n外形上は適法な権利行使だが、社会的に許容される限度を超えるもの。\n\n【判断基準】\n客観的要因：権利行使で得る利益と相手が害される利益の比較衡量\n主観的要因：加害目的の有無\n→両者を総合判断\n\n【代表判例】\n宇奈月温泉事件（大判昭和10年10月5日）\n温泉引用管が他人の土地を通過しているとして管の撤去を求めた事案。権利濫用として請求を棄却。",tags:["民法の本質","用語","権利濫用","民法1条"],createdAt:1700001003000},
  /* ── 物権：総則 ── */
  {id:"b004",term:"民法175条（物権法定主義）【条文】",body:"【条文】\n物権は、この法律その他の法律に定めるもののほか、創設することができない。\n\n【法律要件・効果】\n法律に定めのない物権を創設しようとしても無効（強行規定）。\n\n【趣旨】\n物権は排他的・絶対的な強力な権利であるため、根拠を法律に求める。\n\n【例外：判例が承認する慣習法上の物権】\n・流水利用権\n・温泉専用権（温泉権）\n・譲渡担保権",tags:["物権","条文","民法175条","物権法定主義"],createdAt:1700001004000},
  {id:"b005",term:"物権法定主義・一物一権主義",body:"【物権法定主義】（民法175条）\n物権の種類・内容は法律で定めるものに限る原則。\n\n【民法上の物権10種】\n＜用益物権＞占有権・所有権・地上権・永小作権・地役権・入会権\n＜担保物権＞留置権・先取特権・質権・抵当権\n\n【一物一権主義】\n一個の物に同一内容の物権は一つしか成立しない。物権の排他性に由来。\n\n【物権 vs 債権】\n物権＝絶対的・排他的・誰にでも主張可能\n債権＝相対的・特定の相手方にのみ主張可能",tags:["物権","用語","物権法定主義","一物一権主義","民法175条"],createdAt:1700001005000},
  {id:"b006",term:"民法176条（物権変動・意思主義）【条文】",body:"【条文】\n物権の設定及び移転は、当事者の意思表示のみによって、その効力を生ずる。\n\n【法律要件】\n物権変動を生じさせる当事者の意思表示（契約等）\n\n【法律効果】\n意思表示のみで物権変動の効力が生じる。登記・引渡し等の形式は不要。\n\n【所有権移転時期の判例】\n特定物売買：特約なき限り契約時に移転（最判昭和33年6月20日）\n不特定物売買：目的物が特定した時に移転（最判昭和35年6月24日）\n\n【176条と177条の関係】\n176条→当事者間の成立を規律\n177条→第三者への対抗を規律（役割分担）",tags:["物権","条文","民法176条","意思主義","物権変動"],createdAt:1700001006000},
  {id:"b007",term:"意思主義・形式主義",body:"【意思主義】（日本・フランス法流）\n物権変動は当事者の意思表示のみで効力が生じる。根拠：民法176条\n\n【形式主義】（ドイツ法流）\n物権変動には意思表示に加えて登記や引渡しなどの形式的行為も要件とする。\n\n【意思主義の問題点と解決】\n問題：意思だけで権利が移転すると外部から権利関係が見えず第三者が不利益を受けうる。\n解決：177条・178条による対抗要件主義で補完。\n\n【体系の流れ】\n176条（成立）→ 177条/178条（対抗）",tags:["物権","用語","意思主義","形式主義","民法176条"],createdAt:1700001007000},
  {id:"b008",term:"民法177条（不動産物権変動の対抗要件）【条文】",body:"【条文】\n不動産に関する物権の得喪及び変更は、不動産登記法その他の登記に関する法律の定めるところに従いその登記をしなければ、第三者に対抗することができない。\n\n【法律要件】\n①不動産に関する物権の得喪及び変更があること\n②登記を備えていないこと\n③相手方が「第三者」であること\n\n【法律効果】\n登記なければ物権変動を第三者に対抗できない。当事者間では登記なしに有効。\n\n【重要】\n「得喪及び変更」全般が対象（取消・解除・相続・時効も含む＝無制限説、大連判明治41年12月15日）\n日本の不動産登記には公信力なし（通説）",tags:["物権","条文","民法177条","対抗要件","不動産"],createdAt:1700001008000},
  {id:"b009",term:"民法177条「第三者」の範囲",body:"【定義】（大連判明治41年12月15日・制限説）\n「当事者若クハ其包括承継人ニ非スシテ不動産ニ関スル物権ノ得喪及ヒ変更ノ登記欠缺ヲ主張スル正当ノ利益ヲ有スル者」\n\n【第三者に含まれる例】\n・二重譲受人\n・不動産の差押債権者\n・賃借人\n・単純悪意者（重要：悪意でも第三者に含まれる！）\n\n【第三者に含まれない例】\n・無権利者\n・不法占拠者\n・不法行為者\n・背信的悪意者\n\n【背信的悪意者排除の判例】\n最判昭和43年8月2日（民集22巻8号1571頁）\n「甲に高値で売りつけて利益を得る目的をもつて買い受けた丙は背信的悪意者として第三者にあたらない」\n\n【鉄則】単純悪意者は第三者に含まれる！",tags:["物権","民法177条","対抗要件","第三者","背信的悪意者"],createdAt:1700001009000},
  {id:"b010",term:"民法178条（動産物権変動の対抗要件）【条文】",body:"【条文】\n動産に関する物権の譲渡は、その動産の引渡しがなければ、第三者に対抗することができない。\n\n【法律要件】\n①動産に関する物権の「譲渡」\n②引渡しを備えていないこと\n③相手方が「第三者」であること\n\n【法律効果】\n引渡しがなければ動産物権の譲渡を第三者に対抗できない。\n\n【177条との対比】\n177条＝不動産・「得喪及び変更」全般・登記で公示\n178条＝動産・「譲渡」のみ・引渡しで公示\n\n【引渡しの4類型すべてが対抗要件になる】\n現実の引渡し・簡易の引渡し・占有改定・指図による占有移転　→　全部OK\n\n【例外：登録制度があるもの】\n登録自動車・船舶・特別法上の動産→引渡しが対抗要件にならない",tags:["物権","条文","民法178条","対抗要件","動産"],createdAt:1700001010000},
  {id:"b011",term:"対抗要件・公示の原則・公信の原則",body:"【対抗要件とは】\nすでに生じている物権変動を第三者に主張するための要件。\n\n【公示の原則とは】\n物権変動は外部から認識できる形で示さなければ第三者に対抗できないという原則。\n\n【公示方法】\n不動産→登記（177条）\n動産→引渡し（178条）\n\n【公示 vs 公信】\n公示の原則：公示があれば権利変動があったと推定できる\n公信の原則：公示を信頼した者を保護する（動産では即時取得192条として実現。不動産には公信力なし）\n\n【日本の不動産登記の特徴】\n公信力なし。登記を信頼して取引しても所有権を取得できない場合がある。\n→取引安全は94条2項類推適用で図る。",tags:["物権","用語","対抗要件","公示の原則","公信の原則"],createdAt:1700001011000},
  /* ── 引渡しの4類型 ── */
  {id:"b012",term:"民法182条1項（現実の引渡し）【条文】",body:"【条文】\n占有権の譲渡は、占有物の引渡しによってする。\n\n【意義】\n占有物の現実の支配（直接占有）を物理的に移転すること。最も一般的な引渡し。\n\n【例】\n店頭で商品を手渡す、鍵を渡す。\n\n【即時取得（192条）との関係】→ 成立する ✓\n\n【引渡し4類型における位置づけ】\n物の現実の移動：あり\n関与者：二者間（譲渡人↔譲受人）",tags:["物権","条文","民法182条","引渡し","現実の引渡し","占有"],createdAt:1700001012000},
  {id:"b013",term:"民法182条2項（簡易の引渡し）【条文】",body:"【条文】\n譲受人又はその代理人が現に占有物を所持する場合には、占有権の譲渡は、当事者の意思表示のみによってすることができる。\n\n【意義】\n譲受人（またはその代理人）がすでに目的物を所持している場合に、意思表示のみで占有を移転する方法。\n\n【例】\n借りていた物を買い取る（賃借人が買主になる）\n\n【即時取得（192条）との関係】→ 成立する ✓\n\n【引渡し4類型における位置づけ】\n物の現実の移動：なし（譲受人がすでに所持）\n関与者：二者間\n\n【占有改定との違い】\n簡易の引渡し：譲受人がすでに所持\n占有改定：譲渡人が引き続き所持（方向が逆）",tags:["物権","条文","民法182条","引渡し","簡易の引渡し","占有"],createdAt:1700001013000},
  {id:"b014",term:"民法183条（占有改定）【条文】",body:"【条文】\n代理人が自己の占有物を以後本人のために占有する意思を表示したときは、本人は、これによって占有権を取得する。\n\n【意義】\n譲渡人（代理人）が物を手元に置いたまま、以後譲受人（本人）のために占有する意思を表示することで、譲受人が占有権を取得する方法。物の現実の移動を伴わない。\n\n【例】\n売却後も売主が引き続き使用する場合、譲渡担保\n\n【即時取得（192条）との関係】★最重要★\n→ 成立しない ✗\n最判昭和35年2月11日\n「占有取得の方法が外観上の占有状態に変更を来たさない占有改定にとどまるときは、民法第192条の適用はない」\n理由：外観（物の所持）に変化がないため第三者が信頼できる外観が生じない\n\n【引渡し4類型における位置づけ】\n物の現実の移動：なし（譲渡人が引き続き所持）\n関与者：二者間",tags:["物権","条文","民法183条","引渡し","占有改定","即時取得"],createdAt:1700001014000},
  {id:"b015",term:"民法184条（指図による占有移転）【条文】",body:"【条文】\n代理人によって占有をする場合において、本人がその代理人に対して以後第三者のためにその物を占有することを命じ、その第三者がこれを承諾したときは、その第三者は、占有権を取得する。\n\n【意義】\n占有代理人（直接占有者）が物を占有している状態で、本人（譲渡人）が代理人に「以後は譲受人のために占有せよ」と命じ、譲受人が承諾することで占有を移転する方法。\n\n【要件】\n①占有代理人が物を占有していること\n②本人（譲渡人）が代理人に指図すること\n③第三者（譲受人）が承諾すること\n※占有代理人の承諾は不要！\n\n【例】\n倉庫業者に預けた荷物を売却する際、倉庫業者に「以後Yのために占有せよ」と命じ、Yが承諾する。\n\n【即時取得（192条）との関係】→ 成立する ✓（最判昭和57年9月7日・民集36巻8号1527頁）\n\n【引渡し4類型における位置づけ】\n物の現実の移動：なし（占有代理人が所持）\n関与者：三者間（唯一の三者間方式）\n\n【頻出ひっかけ】\n指図するのは→譲渡人（本人）\n承諾するのは→譲受人（第三者）\n※主体を入れ替えた選択肢に注意！",tags:["物権","条文","民法184条","引渡し","指図による占有移転","即時取得"],createdAt:1700001015000},
  {id:"b016",term:"引渡しの4類型【比較表】",body:"【4類型と即時取得の可否・一覧】\n\n①現実の引渡し（182条1項）\n　物の移動：あり　即時取得：○　関与者：二者\n\n②簡易の引渡し（182条2項）\n　物の移動：なし（譲受人が所持済）　即時取得：○　関与者：二者\n\n③占有改定（183条）\n　物の移動：なし（譲渡人が所持継続）　即時取得：✗　関与者：二者\n\n④指図による占有移転（184条）\n　物の移動：なし（占有代理人が所持）　即時取得：○　関与者：三者\n\n【鉄則】\n占有改定だけが即時取得を生じさせない！\n理由：外観に変更がなく第三者が信頼できる外観が生じないから\n\n【178条の対抗要件】\n4類型すべてが178条の「引渡し」に含まれる（対抗要件としてはすべてOK）",tags:["物権","引渡し","即時取得","比較","民法182条","民法183条","民法184条"],createdAt:1700001016000},
  /* ── 即時取得・盗品遺失物 ── */
  {id:"s002",term:"民法192条（即時取得）【条文】",body:"【条文】\n取引行為によって、平穏に、かつ、公然と動産の占有を始めた者は、善意であり、かつ、過失がないときは、即時にその動産について行使する権利を取得する。\n\n【趣旨】\n民法の原則「無からは無しか生じない」の例外。動産取引における取引の安全を守るための制度（公信の原則）。",tags:["物権","即時取得","条文","民法192条"],createdAt:1700000002000},
  {id:"b017",term:"民法192条（即時取得）【要件・効果】",body:"【法律要件】\n①動産であること\n②有効な取引行為による取得（相続等の包括承継・事実行為は不可）\n③前主が無権利者・無権限者であること\n④平穏・公然・善意・無過失\n⑤占有を取得したこと\n\n【法律効果】\n所有権または質権を原始取得する。前主に付着していた負担は消滅。\n\n【適用対象外】\n・金銭（最判昭和39年1月24日）\n・登録自動車（最判昭和62年4月24日）\n・有価証券（別途善意取得制度）\n・伐採前の立木（不動産）\n\n【善意・無過失の推定】\n186条1項で平穏・公然・善意が推定\n188条により無過失も推定（最判昭和41年6月9日）",tags:["物権","条文","民法192条","即時取得","要件"],createdAt:1700001017000},
  {id:"s003",term:"民法192条（即時取得）【成立要件・構造】",body:"【3要件すべてそろうと「無から有」が生じる】\n\n① 帰責事由：X→A→Yという流れで、Xに帰責事由がある\n② 取引の安全：動産の取引行為・平穏・公然\n③ 善意・無過失：YがAを権利者だと過失なく誤信\n\n【構造図】\nX（真の権利者）→ A（無権利者）→ Y（取得者）\n\n【争いの帰趨】\nYに過失あり→Xの勝ち\nYに過失なし→Yの勝ち",tags:["物権","即時取得","要件","民法192条"],createdAt:1700000003000},
  {id:"s004",term:"民法192条（即時取得）【参考問題】",body:"【問題1】（S63-10-4改）\n立木法で登記された丙所有の樹木を無権利者乙から譲り受け伐採した場合、即時取得できるか？\n→ × 立木法で登記された立木は不動産。不動産には公信力なし（192条の適用なし）。\n\n【問題2】（H13-7-ア改）\n他人の山林を自分のものと誤信して立木を伐採した場合、即時取得が成立するか？\n→ × 伐採は事実行為。「取引行為」ではないので即時取得は成立しない。",tags:["物権","即時取得","参考問題","民法192条"],createdAt:1700000004000},
  {id:"s007",term:"即時取得が成立しない場合",body:"【適用除外のケース】\n\n① 不動産には適用されない\n　根拠：192条に相当する規定が不動産には存在しない\n　例：立木法で登記された立木（不動産扱い）→ ×\n\n② 「取引行為」でない事実行為には適用されない\n　例：他人の山林の立木を伐採 → 事実行為 → ×\n\n③ 占有改定による取得には適用されない（最判昭和35年2月11日）\n　理由：外観上の占有状態に変更がないため\n\n【鉄則】動産の取引行為にのみ適用",tags:["物権","即時取得","例外","民法192条"],createdAt:1700000007000},
  {id:"b018",term:"民法193条（盗品・遺失物の回復）【条文】",body:"【条文】\n前条の場合において、占有物が盗品又は遺失物であるときは、被害者又は遺失者は、盗難又は遺失の時から二年間、占有者に対してその物の回復を請求することができる。\n\n【法律要件】\n①192条の即時取得が成立していること（前提）\n②占有物が「盗品又は遺失物」であること\n③盗難・遺失時から2年以内\n④請求権者が「被害者又は遺失者」\n⑤相手方が「占有者」\n\n【法律効果】\n被害者・遺失者は占有者に対し物の回復を請求できる（即時取得の例外）\n\n【起算点】\n「盗難又は遺失の時」が起算点（占有者が占有を始めた時ではない！）\n\n【適用外】\n詐欺・恐喝・横領など原権利者の意思に基づき占有が移転した場合は適用なし（大判明治41年10月8日）\n\n【関連：194条】\n競売・公の市場・同種物を販売する商人から善意で買い受けた場合→代価弁償が必要",tags:["物権","条文","民法193条","盗品","遺失物","即時取得"],createdAt:1700001018000},
  {id:"b019",term:"盗品・遺失物（用語）",body:"【盗品】\n窃盗・強盗により占有者の意思に反して占有を奪われた物。\n→193条の適用あり\n\n【遺失物】\n窃盗・強盗以外の方法で意思によらず占有を離れた物。\n→193条の適用あり\n\n【適用なし（意思に基づく離脱）】\n詐欺・恐喝・横領など原権利者の意思に基づいて占有が移転した場合\n→193条は適用されない（大判明治41年10月8日）\n→即時取得（192条）の要件を満たせば取得者が保護される\n\n【被害者・遺失者の範囲】\n所有者に限らず、賃借人・受寄者など占有権原のある者も含む（大判昭和4年12月11日）",tags:["物権","用語","民法193条","盗品","遺失物"],createdAt:1700001019000},

  /* ── 相続 ── */
  {id:"b020",term:"民法896条（相続の一般的効力）【条文】",body:"【条文】\n相続人は、相続開始の時から、被相続人の財産に属した一切の権利義務を承継する。ただし、被相続人の一身に専属したものは、この限りでない。\n\n【法律要件】\n相続の開始（被相続人の死亡）\n\n【法律効果】\n相続人は相続開始時から被相続人の財産上の一切の権利義務を包括承継する。\n一身専属権は承継されない。\n\n【一身専属権の例】\n扶養請求権、生活保護受給権、委任契約上の地位（653条）\n\n【相続と対抗要件（177条との関係）】\n法定相続分の範囲内→登記なしに対抗可\n法定相続分を超える部分→登記等の対抗要件を備えなければ第三者に対抗できない（899条の2）",tags:["相続","条文","民法896条","包括承継","一身専属権"],createdAt:1700001020000},
  {id:"b021",term:"包括承継・特定承継",body:"【包括承継（一般承継）】\n個々の権利義務を個別にではなく一括して承継すること。\n例：相続（896条）、合併\n→個別の移転行為が不要\n\n【特定承継】\n個々の権利義務を個別の行為（売買・贈与等）で承継すること。\n例：売買、贈与\n→個別の移転行為が必要\n\n【承継と対抗要件】\n包括承継人は177条の「第三者」に含まれない。\nただし法定相続分超過部分の取得は対抗要件が必要（899条の2）。\n\n【占有権も相続される】\n相続人は被相続人の占有を承継できる（187条）。",tags:["物権","相続","用語","包括承継","特定承継","民法896条"],createdAt:1700001021000},

function load(){
  try{cards=JSON.parse(localStorage.getItem(SK)||'[]')}catch{cards=[]}
  if(cards.length===0){
    cards=[...SEED];
    save();
  }
  renderAll();
}
function save(){localStorage.setItem(SK,JSON.stringify(cards))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function hl(t,q){if(!q)return esc(t);return esc(t).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>')}
function allTags(){const s=new Set();cards.forEach(c=>(c.tags||[]).forEach(t=>s.add(t)));return[...s].sort()}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b}

function sw(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById(name+'Page').classList.add('active');
  document.getElementById('tab-'+name).classList.add('on');
  if(name==='quiz')renderQSetup();
  if(name==='list')renderAll();
}

function doImport(){
  const raw=document.getElementById('importJson').value.trim();
  const st=document.getElementById('importStatus');
  if(!raw){st.textContent='JSONを貼り付けてください';st.style.color='var(--ng)';return}
  let parsed;
  try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim())}
  catch(e){st.textContent='JSONの形式が正しくありません：'+e.message;st.style.color='var(--ng)';return}
  const arr=Array.isArray(parsed)?parsed:[parsed];
  let added=0,skipped=0;
  arr.forEach(d=>{
    if(!d.term){skipped++;return}
    const exists=cards.some(c=>c.term===d.term);
    if(exists){skipped++;return}
    cards.unshift({
      id:d.id||uid(),
      term:d.term,
      body:d.body||'',
      tags:Array.isArray(d.tags)?d.tags:[],
      createdAt:d.createdAt||Date.now()
    });
    added++;
  });
  save();
  st.textContent=`✅ ${added}件を登録しました${skipped>0?'（'+skipped+'件スキップ）':''}`;
  st.style.color='var(--ok)';
}

function doExport(){
  const json=JSON.stringify(cards,null,2);
  const btn=document.querySelector('#importPage button[onclick="doExport()"]');
  const st=document.getElementById('exportStatus');
  navigator.clipboard.writeText(json)
    .then(()=>{st.textContent='✅ コピーしました（'+cards.length+'件）'})
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=json;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      st.textContent='✅ コピーしました（'+cards.length+'件）';
    });
  setTimeout(()=>st.textContent='',3000);
}

function renderAll(){renderTagRow();renderCards()}

function renderTagRow(){
  const tags=allTags();
  document.getElementById('tagRow').innerHTML=
    `<span class="chip ${activeTag===''?'on':''}" onclick="ftag('')">すべて</span>`+
    tags.map(t=>`<span class="chip ${activeTag===t?'on':''}" onclick="ftag('${esc(t)}')">${esc(t)}</span>`).join('');
}
function ftag(t){activeTag=t;renderAll()}

function renderCards(){
  const q=searchQ.trim().toLowerCase();
  const shown=cards.filter(c=>{
    if(activeTag&&!(c.tags||[]).includes(activeTag))return false;
    if(!q)return true;
    return(c.term+' '+(c.body||'')+' '+(c.tags||[]).join(' ')).toLowerCase().includes(q);
  });
  document.getElementById('cnt').textContent=shown.length+'件';
  const el=document.getElementById('clist');
  if(!shown.length){el.innerHTML=`<div class="empty"><div class="big">📜</div><p>${q?'検索結果なし':'＋でカードを追加してください'}</p></div>`;return}
  el.innerHTML=shown.map(c=>`<div class="card" onclick="openDet('${c.id}')">
    <div class="c-term">${hl(c.term,q)}</div>
    <div class="c-tags">${(c.tags||[]).map(t=>`<span class="c-tag">${esc(t)}</span>`).join('')}</div>
    <div class="c-body">${hl(c.body||'',q)}</div>
  </div>`).join('');
}

document.getElementById('si').addEventListener('input',e=>{
  searchQ=e.target.value;
  document.getElementById('clr').style.display=searchQ?'block':'none';
  renderCards();
});
function clrSearch(){document.getElementById('si').value='';searchQ='';document.getElementById('clr').style.display='none';renderCards()}

function openOv(id){document.getElementById(id).classList.add('open')}
function closeOv(id){document.getElementById(id).classList.remove('open')}
function bgClick(e,id){if(e.target===document.getElementById(id))closeOv(id)}

function openAdd(){
  editingId=null;
  document.getElementById('edTitle').textContent='カードを追加';
  ['fTerm','fBody','fTags','fSrc','fAR','fTA','fGA'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fBA').value='';
  document.getElementById('aiPrev').style.display='none';
  document.getElementById('pbox').style.display='none';
  sitab('text');openOv('editOv');
}
function openEdit(id){
  const c=cards.find(x=>x.id===id);if(!c)return;
  editingId=id;
  document.getElementById('edTitle').textContent='カードを編集';
  document.getElementById('fTerm').value=c.term;
  document.getElementById('fBody').value=c.body||'';
  document.getElementById('fTags').value=(c.tags||[]).join(', ');
  sitab('text');closeOv('detOv');openOv('editOv');
}
function sitab(t){
  inputTab=t;
  document.getElementById('pText').style.display=t==='text'?'block':'none';
  document.getElementById('pAI').style.display=t==='ai'?'block':'none';
  document.getElementById('itText').classList.toggle('on',t==='text');
  document.getElementById('itAI').classList.toggle('on',t==='ai');
}
function saveCard(){
  let term,body,tags;
  if(inputTab==='ai'&&document.getElementById('aiPrev').style.display!=='none'){
    term=document.getElementById('fTA').value.trim();
    body=document.getElementById('fBA').value.trim();
    tags=document.getElementById('fGA').value.split(/[,、]/).map(t=>t.trim()).filter(Boolean);
  }else{
    term=document.getElementById('fTerm').value.trim();
    body=document.getElementById('fBody').value.trim();
    tags=document.getElementById('fTags').value.split(/[,、]/).map(t=>t.trim()).filter(Boolean);
  }
  if(!term){alert('用語を入力してください');return}
  if(editingId){const i=cards.findIndex(x=>x.id===editingId);if(i>-1)cards[i]={...cards[i],term,body,tags,updatedAt:Date.now()}}
  else{cards.unshift({id:uid(),term,body,tags,createdAt:Date.now()})}
  save();closeOv('editOv');renderAll();
}

function genPrompt(){
  const src=document.getElementById('fSrc').value.trim();
  if(!src){alert('テキストを貼り付けてください');return}
  const p=`以下の民法テキストを読み、学習カードとしてJSON形式で整理してください。\nJSON以外は出力しないでください（説明・マークダウン不要）。\n\n形式:\n{"term":"用語または条文番号","body":"定義や説明","tags":["タグ1","タグ2"]}\n\nタグは1〜3個（例: 総則, 物権, 債権, 条文, 判例, 用語）\n\n--- テキスト ---\n${src}`;
  document.getElementById('ptxt').textContent=p;
  document.getElementById('pbox').style.display='block';
}
function copyP(){
  const t=document.getElementById('ptxt').textContent;
  const btn=document.querySelector('.cpbtn');
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='✅ コピーしました';setTimeout(()=>btn.textContent='📋 プロンプトをコピー',2000)})
  .catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='✅ コピーしました';setTimeout(()=>btn.textContent='📋 プロンプトをコピー',2000)});
}
function parseAR(){
  const raw=document.getElementById('fAR').value.trim();
  if(!raw){document.getElementById('aiPrev').style.display='none';return}
  try{
    const d=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('fTA').value=d.term||'';
    document.getElementById('fBA').value=d.body||'';
    document.getElementById('fGA').value=(d.tags||[]).join(', ');
    document.getElementById('aiPrev').style.display='block';
  }catch{document.getElementById('aiPrev').style.display='none'}
}

function openDet(id){
  detailId=id;const c=cards.find(x=>x.id===id);if(!c)return;
  document.getElementById('dTerm').textContent=c.term;
  document.getElementById('dBody').textContent=c.body||'（内容なし）';
  document.getElementById('dTags').innerHTML=(c.tags||[]).map(t=>`<span class="c-tag">${esc(t)}</span>`).join('');
  openOv('detOv');
}
function editFD(){if(detailId)openEdit(detailId)}
function delFD(){
  if(!detailId)return;
  const c=cards.find(x=>x.id===detailId);
  if(!confirm(`「${c?.term}」を削除しますか？`))return;
  cards=cards.filter(x=>x.id!==detailId);save();closeOv('detOv');renderAll();
}

function renderQSetup(){
  document.getElementById('qSetup').style.display='block';
  document.getElementById('qPlay').style.display='none';
  document.getElementById('qRes').style.display='none';
  const sel=document.getElementById('qts'),cur=sel.value;
  sel.innerHTML='<option value="">すべて</option>'+allTags().map(t=>`<option value="${esc(t)}" ${cur===t?'selected':''}>${esc(t)}</option>`).join('');
}
function startQuiz(){
  const tag=document.getElementById('qts').value,cnt=parseInt(document.getElementById('qc').value)||0;
  let pool=tag?cards.filter(c=>(c.tags||[]).includes(tag)):[...cards];
  if(!pool.length){alert('カードがありません');return}
  pool=shuf(pool);
  deck=(cnt>0?pool.slice(0,cnt):pool).map(c=>({...c,dir:Math.random()<.5?0:1}));
  qi=0;qOk=0;qNg=0;
  document.getElementById('qSetup').style.display='none';
  document.getElementById('qPlay').style.display='block';
  document.getElementById('qRes').style.display='none';
  renderQCard();
}
function renderQCard(){
  const c=deck[qi],tot=deck.length,fwd=c.dir===0;
  document.getElementById('pf').style.width=(qi/tot*100)+'%';
  document.getElementById('pt').textContent=`${qi+1} / ${tot}`;
  document.getElementById('qm').textContent=fwd?'用語 → 説明':'説明 → 用語';
  document.getElementById('qq').textContent=fwd?c.term:(c.body||'（内容なし）');
  document.getElementById('qat').textContent=fwd?(c.body||'（内容なし）'):c.term;
  document.getElementById('qans').classList.remove('show');
  document.getElementById('qtap').style.display='block';
  document.getElementById('qbtns').style.display='none';
  qShown=false;
}
function reveal(){
  if(qShown)return;qShown=true;
  document.getElementById('qans').classList.add('show');
  document.getElementById('qtap').style.display='none';
  document.getElementById('qbtns').style.display='flex';
}
function judge(ok){
  if(ok)qOk++;else qNg++;qi++;
  if(qi>=deck.length)showRes();else renderQCard();
}
function showRes(){
  document.getElementById('qPlay').style.display='none';
  document.getElementById('qRes').style.display='block';
  const tot=deck.length;
  document.getElementById('rs').textContent=Math.round(qOk/tot*100)+'%';
  document.getElementById('rok').textContent=qOk;
  document.getElementById('rng').textContent=qNg;
  document.getElementById('rt').textContent=tot;
}
function resetQ(){renderQSetup()}

load();
</script>
